  <!-- Lamelle 6 -->
  <path d="M31 33 C27 42, 30 52, 37 57 C39 49, 39 43, 31 33Z" fill="white" opacity="0.92"/>

  <!-- Petit cercle central -->
  <circle cx="48" cy="40" r="5" fill="#0f0e2e"/>
