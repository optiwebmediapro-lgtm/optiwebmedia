  <!-- Texte OPTIWEB -->
  <text x="102" y="35" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="1">OPTIWEB</text>
  <!-- Texte MEDIA -->
